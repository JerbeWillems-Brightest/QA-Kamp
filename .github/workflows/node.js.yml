name: Node.js CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: List package-lock files (debug)
        run: |
          echo "Repository top-level files:"
          ls -la || true
          echo "Searching for package-lock.json files (no depth limit):"
          find . -type f -name 'package-lock.json' -print || true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          # explicit candidate lockfile paths (comma or newline-separated supported)
          cache-dependency-path: |
            Frontend/QA-Kamp/package-lock.json
            Frontend/package-lock.json
            Backend/package-lock.json


      - name: Install dependencies
        working-directory: Frontend/QA-Kamp
        run: npm ci

      - name: Build
        working-directory: Frontend/QA-Kamp
        run: npm run build --if-present

      - name: Run tests
        working-directory: Frontend/QA-Kamp
        run: npm test -- --reporters=default --reporters=jest-junit
        
  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: List package-lock files (debug)
        run: |
          echo "Repository top-level files:"
          ls -la || true
          echo "Searching for package-lock.json files (no depth limit):"
          find . -type f -name 'package-lock.json' -print || true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            Frontend/QA-Kamp/package-lock.json
            Frontend/package-lock.json
            Backend/package-lock.json

      - name: Install dependencies
        working-directory: Backend
        run: npm ci

      - name: Build
        working-directory: Backend
        run: npm run build --if-present

      - name: Run tests
        working-directory: Backend
        run: npm test -- --reporters=default --reporters=jest-junit
