name: Node.js CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          # use a glob to match any package-lock.json in the repo (safer for monorepos)
          cache-dependency-path: '**/package-lock.json'


      - name: Install dependencies
        working-directory: Frontend/QA-Kamp
        run: npm ci

      - name: Build
        working-directory: Frontend/QA-Kamp
        run: npm run build --if-present

      - name: Run tests
        working-directory: Frontend/QA-Kamp
        run: npm test -- --reporters=default --reporters=jest-junit
        
  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: List package-lock files (debug)
        run: |
          echo "Looking for package-lock.json files"
          find . -maxdepth 5 -type f -name 'package-lock.json' -print || true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          # use a glob to match any package-lock.json in the repo (safer for monorepos)
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: Backend
        run: npm ci

      - name: Build
        working-directory: Backend
        run: npm run build --if-present

      - name: Run tests
        working-directory: Backend
        run: npm test -- --reporters=default --reporters=jest-junit
