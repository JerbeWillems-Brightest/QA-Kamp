name: Node.js CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        working-directory: QA-Kamp/Frontend/QA-Kamp
        run: npm ci

      - name: Build
        working-directory: QA-Kamp/Frontend/QA-Kamp
        run: npm run build --if-present

      - name: Run tests
        working-directory: QA-Kamp/Frontend/QA-Kamp
        run: npm test -- --reporters=default --reporters=jest-junit
        
  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        working-directory: QA-Kamp/Backend
        run: npm ci

      - name: Build
        working-directory: QA-Kamp/Backend
        run: npm run build --if-present

      - name: Run tests
        working-directory: QA-Kamp/Backend
        run: npm test -- --reporters=default --reporters=jest-junit
