name: Node.js CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: List package files (debug)
        run: |
          echo "Repository top-level files:"
          ls -la || true
          echo "Searching for package-lock.json files (no depth limit):"
          find . -type f -name 'package-lock.json' -print || true
          echo "Searching for package.json files (no depth limit):"
          find . -type f -name 'package.json' -print || true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          # candidate dependency files: prefer package-lock, but fall back to package.json in each project
          cache-dependency-path: |
            Frontend/QA-Kamp/package-lock.json
            Frontend/package-lock.json
            Backend/package-lock.json
            Frontend/QA-Kamp/package.json
            Frontend/package.json
            Backend/package.json


      - name: Install dependencies
        working-directory: Frontend/QA-Kamp
        run: |
          # use npm ci when a lockfile exists, otherwise fall back to npm install
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lockfile found — running npm ci"
            npm ci
          else
            echo "No lockfile — running npm install"
            npm install
          fi

      - name: Build
        working-directory: Frontend/QA-Kamp
        run: npm run build --if-present

      - name: Run tests
        working-directory: Frontend/QA-Kamp
        run: npm test

  backend:
    needs: frontend
    # use ubuntu-latest (more reliably available) and install libssl1.1 if missing so mongodb-memory-server can run
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: List package files (debug)
        run: |
          echo "Repository top-level files:"
          ls -la || true
          echo "Searching for package-lock.json files (no depth limit):"
          find . -type f -name 'package-lock.json' -print || true
          echo "Searching for package.json files (no depth limit):"
          find . -type f -name 'package.json' -print || true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            Frontend/QA-Kamp/package-lock.json
            Frontend/package-lock.json
            Backend/package-lock.json
            Frontend/QA-Kamp/package.json
            Frontend/package.json
            Backend/package.json

      - name: Install dependencies
        working-directory: Backend
        run: |
          # use npm ci when a lockfile exists, otherwise fall back to npm install
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lockfile found — running npm ci"
            npm ci
          else
            echo "No lockfile — running npm install"
            npm install
          fi

      - name: Ensure OpenSSL 1.1 (libssl1.1) is available for mongodb-memory-server
        if: runner.os == 'Linux'
        run: |
          set -e
          echo "Checking for libssl.so.1.1..."
          if ldconfig -p | grep -q "libssl.so.1.1"; then
            echo "libssl1.1 already installed"
          else
            echo "Attempting to install libssl1.1 via apt"
            sudo apt-get update || true
            if sudo apt-get install -y libssl1.1; then
              echo "Installed libssl1.1 from apt"
            else
              echo "libssl1.1 not in apt repos; fetching focal package and installing"
              PKG_URL="https://security.ubuntu.com/ubuntu/pool/main/o/openssl1.1/libssl1.1_1.1.1f-1ubuntu2.16_amd64.deb"
              wget -q "$PKG_URL" -O /tmp/libssl1.1.deb || true
              sudo dpkg -i /tmp/libssl1.1.deb || true
              sudo apt-get -f install -y || true
              echo "Attempted libssl1.1 install"
            fi
          fi
